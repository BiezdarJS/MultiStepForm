<div class="container">
  <header>Signup Form</header>
  <app-progress-bar />
  <div class="form-outer">
    <form [formGroup]="multiStepFormService.multiStepForm" (ngSubmit)="onSubmit()">
      <ng-container [formGroup]="nameGroup">
        <fieldset class="page slide-page" #slidePage>
          <div class="title">
            Basic Info:
          </div>
          <div class="field">
            <div class="label">
              First Name
            </div>
            <input formControlName="first_name" type="text">
          </div>
          <div class="field">
            <div class="label">
              Last Name
            </div>
            <input formControlName="last_name" type="text">
          </div>
          <div class="field field--column">
            <button type="button" class="firstNext next" (click)="handleNextBtnClick(NextSlideAmoutEnumEnum.FIRST)">Next</button>
            @if (showValidationMessage() && !nameGroup.valid) {
              <p class="validation-msg">
                Nie wypełniono wyszystkich pól
              </p>
            }
          </div>
        </fieldset>
      </ng-container>
      <ng-container [formGroup]="contactGroup">
      <fieldset class="page">
        <div class="title">
          Contact Info:
        </div>
        <div class="field">
          <div class="label">
            Email Address
          </div>
          <input formControlName="email" type="text">
        </div>
        <div class="field">
          <div class="label">
            Phone Number
          </div>
          <input formControlName="phone" type="Number">
        </div>
        <div class="field btns">
          <button type="button" class="prev-1 prev" (click)="handlePrevBtnClick(PrevSlideAmoutEnumEnum.FIRST)">Previous</button>
          <button type="button" class="next-1 next" (click)="handleNextBtnClick(NextSlideAmoutEnumEnum.SECOND)">Next</button>
        </div>
      </fieldset>
      </ng-container>
      <ng-container [formGroup]="birthGroup">
      <fieldset class="page">
        <div class="title">
          Date of Birth:
        </div>
        <div class="field">
          <div class="label">
            Date
          </div>
          <input formControlName="date" type="date">
        </div>
        <div class="field">
          <div class="label">
            Gender
          </div>
          <select formControlName="gender">
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
        </div>
        <div class="field btns">
          <button type="button" class="prev-2 prev" (click)="handlePrevBtnClick(PrevSlideAmoutEnumEnum.SECOND)">Previous</button>
          <button type="button" class="next-2 next" (click)="handleNextBtnClick(NextSlideAmoutEnumEnum.THIRD)">Next</button>
        </div>
      </fieldset>
      </ng-container>
      <ng-container [formGroup]="loginInfoGroup">
      <fieldset class="page">
        <div class="title">
          Login Details:
        </div>
        <div class="field">
          <div class="label">
            Username
          </div>
          <input type="text">
        </div>
        <div class="field">
          <div class="label">
            Password
          </div>
          <input type="password">
        </div>
        <div class="field btns">
          <button type="button" class="prev-3 prev" (click)="handlePrevBtnClick(PrevSlideAmoutEnumEnum.THIRD)">Previous</button>
          <button class="submit">Submit</button>
        </div>
      </fieldset>
      </ng-container>
    </form>
  </div>
</div>
